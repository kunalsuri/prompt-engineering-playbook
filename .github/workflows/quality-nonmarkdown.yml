name: Quality - Non-Markdown Surfaces

on:
  push:
    branches: [main]
    paths:
      - 'Makefile'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.shellcheckrc'
      - 'requirements-*.txt'
      - 'learn/labs/requirements.txt'
      - 'learn/labs/**/*.py'
      - 'learn/labs/**/*.ipynb'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Makefile'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.shellcheckrc'
      - 'requirements-*.txt'
      - 'learn/labs/requirements.txt'
      - 'learn/labs/**/*.py'
      - 'learn/labs/**/*.ipynb'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements-docs.txt -r requirements-dev.txt

      - name: Run repository checks
        # `make check` now runs: structural linters, schema validation, citation
        # check, cross-link resolution, lab-sync, the pytest tooling suite (with
        # coverage), symlink checks, and the docs build.
        run: make check

  lab-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Verify .py/.ipynb lab pairs are in sync
        # Uses only stdlib (ast, json, re) -- no pip install required.
        # Checks:
        #   1. Notebook `from lab_XX import NAMES` -> each NAME exists in the .py
        #   2. Labs 1-4: UPPERCASE string constants in .py match notebook code cells
        #      (comparison uses ast evaluation, not raw text, to handle escape sequences)
        run: python scripts/check-lab-sync.py

  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r learn/labs/requirements.txt nbclient nbformat ipykernel pandas

      - name: Execute notebook smoke tests (deterministic, no external API calls)
        env:
          LABS_SKIP_API: '1'
          LLM_MODEL: 'mock-labs'
        run: python scripts/run-notebook-smoke.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Static-analyse shell scripts
        # shellcheck is preinstalled on ubuntu-latest runners.
        # Configuration (disabled rules) lives in .shellcheckrc.
        run: shellcheck scripts/*.sh scripts/*/*.sh
