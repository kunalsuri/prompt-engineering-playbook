name: Quality - Non-Markdown Surfaces

on:
  push:
    branches: [main]
    paths:
      - 'Makefile'
      - 'mkdocs.yml'
      - 'requirements-*.txt'
      - 'learn/labs/**/*.py'
      - 'learn/labs/**/*.ipynb'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Makefile'
      - 'mkdocs.yml'
      - 'requirements-*.txt'
      - 'learn/labs/**/*.py'
      - 'learn/labs/**/*.ipynb'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements-docs.txt -r requirements-dev.txt

      - name: Run repository checks
        run: make check

  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r learn/labs/requirements.txt nbclient nbformat ipykernel pandas

      - name: Execute notebook smoke tests (deterministic, no external API calls)
        env:
          LABS_SKIP_API: '1'
          LLM_MODEL: 'mock-labs'
        run: python scripts/run-notebook-smoke.py
