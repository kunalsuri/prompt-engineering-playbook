# --------------------------
# Deploy MkDocs Material to GitHub Pages
# Triggers on push to main or manual dispatch
# --------------------------
name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'learn/**'
      - 'prompts/**'
      - 'docs_src/**'
      - 'assets/**'
      - 'requirements-docs.txt'
      - 'Makefile'
      - 'scripts/docs-serve.sh'
      - 'mkdocs.yml'
      - 'README.md'
      - 'GETTING-STARTED.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'BETA-RELEASE-NOTES.md'
      - 'references.md'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:              # allow manual re-deploy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false       # let running deploys finish

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install MkDocs Material & plugins
        run: pip install -r requirements-docs.txt

      - name: Prepare docs_src symlinks
        run: |
          mkdir -p docs_src
          for path in learn/learn prompts/prompts assets/assets docs_src/learn/learn docs_src/prompts/prompts docs_src/assets/assets; do
            if [ -L "$path" ]; then rm "$path"; fi
          done

          link() {
            src="$1"
            dst="$2"
            src_check="$(dirname "$dst")/$src"
            if [ ! -e "$src_check" ]; then
              echo "ERROR: Source path not found: $src"
              exit 1
            fi
            if [ -e "$dst" ] && [ ! -L "$dst" ]; then
              echo "ERROR: Destination exists and is not a symlink: $dst"
              exit 1
            fi
            ln -sfn "$src" "$dst"
          }

          link ../README.md docs_src/index.md
          link ../GETTING-STARTED.md docs_src/GETTING-STARTED.md
          link ../CONTRIBUTING.md docs_src/CONTRIBUTING.md
          link ../CHANGELOG.md docs_src/CHANGELOG.md
          link ../BETA-RELEASE-NOTES.md docs_src/BETA-RELEASE-NOTES.md
          link ../references.md docs_src/references.md
          link ../learn docs_src/learn
          link ../prompts docs_src/prompts
          link ../assets docs_src/assets

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
